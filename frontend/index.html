<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#f6a829" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>DJ System</title>
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body>
    <main id="phone" class="phone" data-view="intro">
      <div id="decorCanvas" class="decor-canvas" aria-hidden="true"></div>

      <section class="ui-layer" aria-label="DJ System">
        <header class="app-header">
          <h1>DJ System</h1>
          <form id="searchForm" class="search-form">
            <label class="visually-hidden" for="searchInput">Search song</label>
            <input
              id="searchInput"
              type="search"
              name="q"
              placeholder="Search..."
              autocomplete="off"
              required
            />
            <button class="search-button" type="submit" aria-label="Search">
              <span class="search-icon" aria-hidden="true"></span>
            </button>
          </form>
          <p class="subtitle">for Clark</p>
        </header>

        <div class="intro-meta">
          <p class="intro-note">&copy; Life is Tech!</p>
          <p class="intro-credit">Created by Canta</p>
          <a
            class="intro-link"
            href="https://github.com/k4nkan/dj-system-for-clark"
            target="_blank"
            rel="noreferrer"
          >
            GitHub
          </a>
        </div>

        <section id="resultsPanel" class="results-panel" hidden>
          <div id="results" class="results-list"></div>

          <div class="choose-bar">
            <span id="chooseBarText">Choose a Song !!</span>

            <section id="passwordPanel" class="password-panel" hidden>
              <div class="selected-song">
                <div id="selectedCover" class="selected-cover"></div>
                <h2 id="selectedTrackText">Song Title</h2>
                <p id="selectedArtistText">Artist Name</p>
              </div>

              <form id="requestForm" class="password-form">
                <label class="visually-hidden" for="mentorPasswordInput">
                  Password
                </label>
                <input
                  id="mentorPasswordInput"
                  type="password"
                  placeholder="Password in Here"
                  autocomplete="off"
                  required
                />
                <button class="lock-button" type="submit" aria-label="Add song">
                  <span class="lock-icon" aria-hidden="true"></span>
                </button>
              </form>
            </section>
          </div>
        </section>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
    <script src="scripts/decor.js"></script>
    <script src="scripts/app.js" type="module"></script>
  </body>
</html>
